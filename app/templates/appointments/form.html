{% extends 'base.html' %}{% block content %}<div class="page-head"><div><h1>Novo agendamento</h1><p>Selecione um visitante ativo e a data da visita.</p></div></div><form method="post" class="card form-grid"><label class="full">Visitante<select name="visitor_id" required>{% for v in visitors %}<option value="{{v.id}}">{{v.full_name}} — {{v.resident_name}}</option>{% endfor %}</select></label><label>Data e hora<input type="datetime-local" name="scheduled_for" required></label><label class="full">Observações<textarea name="notes"></textarea></label><div class="full actions"><a class="button secondary" href="{{url_for('appointments.index')}}">Cancelar</a><button>Salvar agendamento</button></div></form>{% endblock %}
