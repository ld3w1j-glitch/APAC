{% extends 'base.html' %}{% block content %}<div class="page-head"><div><h1>Nova ocorrência</h1><p>Registre somente informações objetivas e necessárias.</p></div></div><form method="post" class="card form-grid"><label class="full">Visitante<select name="visitor_id" required>{% for v in visitors %}<option value="{{v.id}}">{{v.full_name}} — {{v.cpf}}</option>{% endfor %}</select></label><label>Categoria<select name="category"><option>Conduta inadequada</option><option>Objeto proibido</option><option>Descumprimento de orientação</option><option>Segurança</option><option>Outro</option></select></label><label>Gravidade<select name="severity"><option value="leve">Leve</option><option value="moderada">Moderada</option><option value="grave">Grave</option></select></label><label class="full">Descrição<textarea name="description" required></textarea></label><label class="full">Medida adotada<textarea name="action_taken"></textarea></label><label class="check full"><input type="checkbox" name="suspend_visitor"> Suspender imediatamente o cadastro do visitante</label><div class="full actions"><a class="button secondary" href="{{url_for('occurrences.index')}}">Cancelar</a><button class="danger">Registrar ocorrência</button></div></form>{% endblock %}
