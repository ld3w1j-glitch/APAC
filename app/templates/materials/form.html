{% extends 'base.html' %}{% block content %}<div class="page-head"><div><h1>Registrar material</h1><p>O item ficará aguardando vistoria antes da entrega.</p></div></div><form method="post" class="card form-grid"><label class="full">Visitante<select name="visitor_id" required>{% for v in visitors %}<option value="{{v.id}}">{{v.full_name}} — {{v.resident_name}}</option>{% endfor %}</select></label><label class="full">Descrição<textarea name="description" required></textarea></label><label>Quantidade<input name="quantity"></label><label class="full">Observações<textarea name="notes"></textarea></label><div class="full actions"><a class="button secondary" href="{{url_for('materials.index')}}">Cancelar</a><button>Registrar</button></div></form>{% endblock %}
