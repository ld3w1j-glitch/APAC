{% extends 'base.html' %}{% block content %}<h1>Portaria</h1><form class="search" method="post" action="{{url_for('checkin.search')}}"><input name="term" placeholder="Digite CPF ou código da credencial" required><button>Localizar</button></form><section class="card"><h2>Pessoas dentro da unidade</h2><table><tr><th>Visitante</th><th>Recuperando</th><th>Entrada</th><th></th></tr>{% for l in active %}<tr><td>{{l.visitor.full_name}}</td><td>{{l.visitor.resident_name}}</td><td>{{l.check_in.strftime('%H:%M')}}</td><td><form method="post" action="{{url_for('checkin.leave',log_id=l.id)}}"><button class="danger">Registrar saída</button></form></td></tr>{% else %}<tr><td colspan="4">Ninguém na unidade.</td></tr>{% endfor %}</table></section>{% endblock %}
