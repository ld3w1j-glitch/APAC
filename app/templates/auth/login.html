{% extends 'base.html' %}{% block title %}Login · APAC Visitas Pouso Alegre{% endblock %}
{% block content %}
<section class="login-card">
  <img src="{{ url_for('static',filename='img/logo_apac.png') }}" alt="APAC Pouso Alegre - MG">
  <h1>Acesso ao sistema</h1>
  <form method="post">
    <label>Usuário<input name="username" required></label>
    <label>Senha<input type="password" name="password" required></label>
    <button>Entrar</button>
  </form>
</section>
{% endblock %}
