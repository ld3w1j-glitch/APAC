{% extends 'base.html' %}{% block content %}<div class="page-head"><h1>Visitantes</h1><a class="button" href="{{url_for('visitors.create')}}">Novo cadastro</a></div><form class="search"><input name="q" value="{{q}}" placeholder="Nome, CPF ou recuperando"><button>Buscar</button></form><section class="card"><table><tr><th>Visitante</th><th>CPF</th><th>Recuperando</th><th>Status</th></tr>{% for v in visitors %}<tr><td><a href="{{url_for('visitors.detail',visitor_id=v.id)}}">{{v.full_name}}</a></td><td>{{v.cpf}}</td><td>{{v.resident_name}}</td><td><span class="badge {{v.status}}">{{v.status}}</span></td></tr>{% else %}<tr><td colspan="4">Nenhum resultado.</td></tr>{% endfor %}</table></section>{% endblock %}
